<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<title>App de Shaiel</title>
	<style>
html, body {
	margin: 0;
	padding: 0;
	border: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
	background: #111;
	touch-action: none;
	color: white;
}

#canvas {
	display: block;
	position: absolute;
	top: 0;
	left: 260px;
	width: calc(100% - 260px);
	height: 100%;
	border: 0;
	padding: 0;
	margin: 0;
}

#canvas:focus { outline: none; }

#status, #status-splash, #status-progress {
	position: absolute;
	left: 260px;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #111;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
	display: none;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

/* UI Panel */
#ui-panel {
	position: fixed;
	top: 0;
	left: 0;
	width: 260px;
	height: 100vh;
	background: #1a1a1a;
	border-right: 1px solid #2a2a2a;
	padding: 24px 20px;
	display: flex;
	flex-direction: column;
	gap: 16px;
	z-index: 9999;
	overflow-y: auto;
	font-family: system-ui, sans-serif;
	color: #fff;
	box-sizing: border-box;
}

.field { display: flex; flex-direction: column; gap: 6px; }
.field-header { display: flex; justify-content: space-between; align-items: center; }
.field-label { font-size: 13px; color: #aaa; }
.field-value { font-size: 13px; font-weight: 500; color: #fff; }
input[type=range] { width: 100%; accent-color: #a78bfa; cursor: pointer; }

.talla-badge {
	background: #2a2a2a;
	border-radius: 8px;
	padding: 12px;
	text-align: center;
}
.talla-num { font-size: 28px; font-weight: 700; color: #a78bfa; }
.talla-sub { font-size: 11px; color: #555; margin-top: 2px; }

.apply-btn {
	width: 100%;
	padding: 12px;
	background: #a78bfa;
	color: #000;
	font-weight: 600;
	font-size: 14px;
	border: none;
	border-radius: 8px;
	cursor: pointer;
	margin-top: auto;
}
.apply-btn:hover { background: #c4b5fd; }

.hint {
	position: fixed;
	bottom: 16px;
	left: 50%;
	transform: translateX(calc(-50% + 130px));
	background: rgba(0,0,0,0.6);
	border: 1px solid #333;
	border-radius: 999px;
	padding: 6px 14px;
	font-size: 11px;
	color: #666;
	white-space: nowrap;
	z-index: 9998;
}
@media (max-width: 768px) {
	#ui-panel {
		width: 100%;
		height: auto;
		max-height: 45vh;
		bottom: 0;
		top: auto;
		border-right: none;
		border-top: 1px solid #2a2a2a;
		flex-direction: row;
		flex-wrap: wrap;
		gap: 10px;
		padding: 16px;
	}

	#canvas {
		left: 0;
		width: 100%;
		height: 55vh;
	}

	#status, #status-splash, #status-progress {
		left: 0;
		top: 0;
		height: 55vh;
	}

	.talla-badge {
		display: flex;
		align-items: center;
		gap: 8px;
		padding: 8px 12px;
	}

	.talla-num { font-size: 20px; }

	.apply-btn {
		margin-top: 0;
		padding: 8px 12px;
		font-size: 13px;
		width: auto;
	}

	.hint { display: none; }
}

	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
</head>
<body>

<!-- UI Panel -->
<div id="ui-panel">
	<div style="font-size:15px;font-weight:600">App de <span style="color:#a78bfa">Shaiel</span></div>
	<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.08em">Ingrese sus Medidas</div>

	<div style="display:flex;flex-direction:column;gap:14px">
		<div class="field">
			<div class="field-header">
				<span class="field-label">Altura</span>
				<span class="field-value" id="val-altura">165 cm</span>
			</div>
			<input type="range" id="sl-altura" min="145" max="185" value="165" oninput="updateUI()">
			<div style="display:flex;justify-content:space-between;font-size:10px;color:#444"><span>145</span><span>185 cm</span></div>
		</div>
		<div class="field">
			<div class="field-header">
				<span class="field-label">Busto</span>
				<span class="field-value" id="val-busto">88 cm</span>
			</div>
			<input type="range" id="sl-busto" min="70" max="120" value="88" oninput="updateUI()">
			<div style="display:flex;justify-content:space-between;font-size:10px;color:#444"><span>70</span><span>120 cm</span></div>
		</div>
		<div class="field">
			<div class="field-header">
				<span class="field-label">Cintura</span>
				<span class="field-value" id="val-cintura">70 cm</span>
			</div>
			<input type="range" id="sl-cintura" min="55" max="105" value="70" oninput="updateUI()">
			<div style="display:flex;justify-content:space-between;font-size:10px;color:#444"><span>55</span><span>105 cm</span></div>
		</div>
		<div class="field">
			<div class="field-header">
				<span class="field-label">Caderas</span>
				<span class="field-value" id="val-caderas">96 cm</span>
			</div>
			<input type="range" id="sl-caderas" min="75" max="130" value="96" oninput="updateUI()">
			<div style="display:flex;justify-content:space-between;font-size:10px;color:#444"><span>75</span><span>130 cm</span></div>
		</div>
	</div>

	<div class="talla-badge">
		<div class="talla-num" id="talla">M</div>
		<div class="talla-sub">Talla aproximada</div>
	</div>

	<button class="apply-btn" onclick="applyMeasurements()">Aplicar al maniquí</button>
</div>

<!-- Godot Canvas -->
<canvas id="canvas">
	Your browser does not support the canvas tag.
</canvas>

<noscript>Your browser does not support JavaScript.</noscript>

<div id="status">
	<progress id="status-progress"></progress>
	<div id="status-notice"></div>
</div>

<div class="hint">Arrastra para rotar · Scroll para zoom</div>

<script src="index.js"></script>
<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":8284044,"index.wasm":36145869},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) return;
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) statusNotice.removeChild(statusNotice.lastChild);
		text.split('\n').forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) setStatusNotice(err.message);
		else if (typeof err === 'string') setStatusNotice(err);
		else setStatusNotice('An unknown error occurred.');
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });

	if (missing.length !== 0) {
		displayFailureNotice('Error\nMissing features:\n' + missing.join('\n'));
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => setStatusMode('hidden'), displayFailureNotice);
	}
}());

// UI Functions
function updateUI() {
	const b  = +document.getElementById('sl-busto').value;
	const c  = +document.getElementById('sl-cintura').value;
	const ca = +document.getElementById('sl-caderas').value;
	const a  = +document.getElementById('sl-altura').value;
	document.getElementById('val-busto').textContent   = b  + ' cm';
	document.getElementById('val-cintura').textContent = c  + ' cm';
	document.getElementById('val-caderas').textContent = ca + ' cm';
	document.getElementById('val-altura').textContent  = a  + ' cm';
	document.getElementById('talla').textContent = b<=80?'XS':b<=84?'S':b<=88?'M':b<=92?'L':b<=100?'XL':'XXL';
}

function applyMeasurements() {
	const busto   = +document.getElementById('sl-busto').value;
	const cintura = +document.getElementById('sl-cintura').value;
	const caderas = +document.getElementById('sl-caderas').value;
	const altura  = +document.getElementById('sl-altura').value;
	try {
		GodotRuntime.callFunction('update_mannequin', [busto, cintura, caderas, altura]);
	} catch(e) {
		console.warn('Godot not ready yet:', e);
	}
}
</script>
</body>
</html>
